<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FashionChameleon - Real-Time human-garment customization</title>
    <!-- 1. Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            scroll-behavior: smooth;
        }
        .font-serif {
            font-family: 'Cormorant Garamond', serif;
        }
        .selection-gold::selection {
            background-color: rgba(212, 175, 55, 0.3);
            color: white;
        }
        .text-shadow-glow {
            text-shadow: 0 0 15px rgba(0,0,0,0.9), 0 0 30px rgba(212,175,55,0.4);
        }
    </style>
    <!-- 3. React dependencies (UMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 4. Babel for JSX parsing in browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <!-- 5. Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <!-- 6. Framer Motion (global) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
</head>
<body class="selection-gold">
    <div id="root">
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: #d4af37; font-family: serif; font-size: 1.5rem; background: #0a0a0a;">
            Loading FashionChameleon Experience...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Robust Framer Motion access
        const MotionContainer = window.Motion || window.FramerMotion || {};
        const motion = MotionContainer.motion || new Proxy({}, {
            get: (target, prop) => (props) => {
                const { initial, animate, transition, ...rest } = props;
                const Tag = prop;
                return <Tag {...rest} />;
            }
        });
        const AnimatePresence = MotionContainer.AnimatePresence || (({children}) => <>{children}</>);

        // Custom Icon Component to handle Lucide in CDN version
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            useEffect(() => {
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} {...props}></i>;
        };

        function TypewriterPhrase({ text = "" }) {
            if (!text) return null;
            return (
                <motion.div 
                    initial={{ opacity: 0 }}
                    animate={{ opacity: 1 }}
                    exit={{ opacity: 0 }}
                    className="flex items-center"
                >
                    {text.split("").map((char, i) => (
                        <motion.span
                            key={i}
                            initial={{ opacity: 0, x: 2, filter: "blur(4px)" }}
                            animate={{ opacity: 1, x: 0, filter: "blur(0px)" }}
                            transition={{ 
                                delay: i * 0.02, 
                                duration: 0.4,
                                ease: "easeOut"
                            }}
                            className="inline-block"
                        >
                            {char === " " ? "\u00A0" : char}
                        </motion.span>
                    ))}
                </motion.div>
            );
        }

        function RotatingText() {
            const phrases = [
                "Interactive Video Customization",
                "Multi-Garment Video Customization",
                "Long-Video Extrapolation",
                "Single-Garment Video Customization"
            ];
            const [index, setIndex] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setIndex((prev) => (prev + 1) % phrases.length);
                }, 4000);
                return () => clearInterval(timer);
            }, []);

            return (
                <div className="flex items-center gap-3 overflow-hidden h-10 px-4 border-l border-white/10 ml-2 w-[380px]">
                    <div className="flex flex-col h-full justify-center text-left">
                        <span className="text-[7px] uppercase tracking-[0.4em] font-black text-white/20 leading-none mb-1 text-left italic">Enables</span>
                        <div className="h-4 flex items-center">
                            <AnimatePresence mode="wait">
                                <motion.div
                                    key={index}
                                    className="text-[9px] md:text-[11px] font-sans uppercase tracking-[0.1em] font-bold text-white whitespace-nowrap"
                                >
                                    <TypewriterPhrase text={phrases[index]} />
                                </motion.div>
                            </AnimatePresence>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const videoRef = React.useRef(null);

            useEffect(() => {
                if (videoRef.current) {
                    videoRef.current.play().catch(error => {
                        console.log("Autoplay was prevented:", error);
                    });
                }
            }, []);

            return (
                <div className="min-h-screen text-white">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 bg-[#0a0a0a]/80 backdrop-blur-xl border-b border-white/5">
                        <div className="max-w-[1600px] mx-auto px-8 lg:px-12 h-20 flex items-center justify-between relative">
                            {/* Left: Brand */}
                            <div className="flex items-center">
                                <div className="flex items-center gap-3">
                                    <span className="font-serif italic text-2xl tracking-tighter text-[var(--accent)] whitespace-nowrap">FashionChameleon</span>
                                </div>
                                <div className="hidden md:block">
                                    <RotatingText />
                                </div>
                            </div>

                            {/* Center: Navigation Links (Fixed Position) */}
                            <div className="absolute left-[70%] -translate-x-1/2 hidden lg:flex items-center gap-10 text-[10px] uppercase tracking-[0.4em] font-black text-gray-500">
                                <a href="#abstract" className="hover:text-[var(--accent)] transition-all duration-300">Abstract</a>
                                <a href="#method" className="hover:text-[var(--accent)] transition-all duration-300">Methodology</a>
                                <a href="#bibtex" className="hover:text-[var(--accent)] transition-all duration-300">Citation</a>
                            </div>

                            {/* Right: Branding */}
                            <div className="flex items-center gap-3">
                                <span className="text-[16px] font-black text-[#ff5000] tracking-tight">Taobao</span>
                                <div className="w-9 h-9 flex items-center justify-center shrink-0">
                                    <img 
                                        src="src/logo.png" 
                                        alt="Logo" 
                                        className="w-full h-full object-contain"
                                        onError={(e) => { e.target.style.display = 'none'; }}
                                    />
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-44 pb-20 px-8">
                        <div className="max-w-7xl mx-auto text-center relative z-10">
                            <motion.div
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 1.5 }}
                            >
                                <div className="flex items-center justify-center mb-4">
                                    <div className="text-[10px] md:text-xs font-serif text-[var(--accent)] italic tracking-[0.4em] uppercase font-bold text-shadow-glow">
                                        Streaming & Real-Time & Interactive
                                    </div>
                                </div>

                                <h1 className="text-5xl md:text-[7.5rem] font-serif leading-none tracking-tighter mb-0 bg-gradient-to-b from-white to-white/60 bg-clip-text text-transparent">
                                    FashionChameleon
                                </h1>

                                <p className="max-w-4xl mx-auto text-xl md:text-2xl font-serif text-gray-400 leading-relaxed mb-4 tracking-wide italic">
                                    Towards Real-Time and Interactive Human-Garment Video Customization
                                </p>

                                {/* Author List */}
                                <div className="flex flex-col items-center gap-4 mb-10 max-w-4xl mx-auto">
                                    <div className="flex flex-col items-center gap-1.5 text-[14px] tracking-wide font-medium text-white/90">
                                        <div className="flex flex-wrap justify-center gap-x-8">
                                            <span className="cursor-default">Quanjian Song<sup>1,2</sup></span>
                                            <span className="cursor-default">Yefeng Shen<sup>2</sup></span>
                                            <span className="cursor-default">Mengting Chen<sup>2</sup></span>
                                            <span className="cursor-default">Hao Sun<sup>2</sup></span>
                                        </div>
                                        <div className="flex flex-wrap justify-center gap-x-8">
                                            <span className="cursor-default">Jinsong Lan<sup>2</sup></span>
                                            <span className="cursor-default">Xiaoyong Zhu<sup>2</sup></span>
                                            <span className="cursor-default">Bo Zheng<sup>2</sup></span>
                                            <span className="cursor-default">Liujuan Cao<sup>1</sup></span>
                                        </div>
                                    </div>
                                    <div className="flex gap-12 text-[10px] uppercase tracking-[0.3em] text-gray-400 font-bold">
                                        <span className="underline underline-offset-8 decoration-[var(--accent)]/40"><sup>1</sup> Xiamen University</span>
                                        <span className="underline underline-offset-8 decoration-[var(--accent)]/40"><sup>2</sup> Alibaba Group</span>
                                    </div>
                                </div>

                                {/* Project Links */}
                                <div className="flex flex-wrap items-center justify-center gap-4 md:gap-6 mb-10">
                                    <a href="https://github.com/quanjiansong/FashionChameleon" className="group flex items-center gap-3 px-7 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-black hover:bg-white hover:text-black transition-all duration-500">
                                        <Icon name="github" className="w-4 h-4" />
                                        GitHub
                                    </a>
                                    <button className="group flex items-center gap-3 px-7 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-black hover:bg-white hover:text-black transition-all duration-500">
                                        <Icon name="file-text" className="w-4 h-4" />
                                        Paper PDF
                                    </button>
                                    <button className="group flex items-center gap-3 px-7 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-black hover:bg-white hover:text-black transition-all duration-500">
                                        <Icon name="smile" className="w-4 h-4 text-[#FFD21E]" />
                                        HuggingFace
                                    </button>
                                    <button className="group flex items-center gap-3 px-7 py-2 bg-white/5 border border-white/10 rounded-full text-[10px] uppercase tracking-[0.2em] font-black hover:bg-white hover:text-black transition-all duration-500">
                                        <Icon name="activity" className="w-4 h-4 text-[var(--accent)]" />
                                        HGC-Bench
                                    </button>
                                </div>

                                {/* Main Visual / Demo */}
                                <div className="max-w-[1600px] mx-auto px-4 relative group">
                                    <div className="absolute -inset-10 bg-[var(--accent)]/5 blur-[120px] rounded-full translate-y-20 opacity-40"></div>
                                    <div className="relative aspect-[16/9] rounded-2xl overflow-hidden bg-black border border-white/5 shadow-[0_50px_100px_-20px_rgba(0,0,0,0.8)]">
                                        <video
                                            ref={videoRef}
                                            className="w-full h-full object-cover opacity-80"
                                            autoPlay
                                            loop
                                            playsInline
                                            controls
                                        >
                                            <source src="src/demo.mp4" type="video/mp4" />
                                            Your browser does not support the video tag.
                                        </video>
                                    </div>

                                    {/* TL;DR */}
                                    <div className="mt-12 text-center max-w-none mx-auto px-6">
                                        <div className="inline-block px-4 py-1 border border-[var(--accent)]/20 rounded-full mb-4">
                                            <span className="text-[9px] uppercase tracking-[0.5em] font-black text-[var(--accent)]">TL;DR</span>
                                        </div>
                                        <p className="text-lg md:text-xl font-light text-gray-400 italic leading-relaxed tracking-wide">
                                            We propose <span className="text-white font-medium">FashionChameleon</span>, a real-time and interactive framework for human-garment customization in streaming autoregressive video generation. It achieves real-time generation at <span className="text-[var(--accent)] font-bold">23.8 FPS</span> on a single GPU.
                                        </p>
                                    </div>
                                </div>
                            </motion.div>
                        </div>
                    </section>

                    {/* Abstract Section */}
                    <section id="abstract" className="py-24 px-8 lg:px-12 bg-white/2">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-col items-center text-center mb-4">
                                <h2 className="text-3xl md:text-4xl font-serif italic text-white tracking-tight">Abstract</h2>
                                <div className="w-16 h-px bg-[var(--accent)]/40 mt-1"></div>
                            </div>
                            <div className="text-lg text-gray-400 font-light leading-[1.8] text-justify mt-8">
                                <p>
                                    Human-centric video customization, particularly at the garment level, has shown significant commercial value. However, existing approaches cannot support low-latency and interactive garment control, which is crucial for applications such as e-commerce and content creation.
                                    This paper studies how to achieve interactive multi-garment video customization while preserving motion coherence using only single-garment video data.
                                    We present <strong className="text-white font-medium">FashionChameleon</strong>, a real-time and interactive framework for human-garment customization in autoregressive video generation, where users can interactively switch garment during generation.
                                    FashionChameleon consists of three key techniques:
                                    (i) Instead of training on multi-garment video data, we train a <strong className="text-white font-medium">Teacher Model with In-Context Learning</strong> on a single reference–garment pair. By retaining the <em>image-to-video training paradigm</em> while <em>enforcing a mismatch between the reference and garment image</em>, the model is encouraged to implicitly preserve coherence during single-garment switching.
                                    (ii) To achieve consistency and efficiency during generation, we introduce <strong className="text-white font-medium">Streaming Distillation with In-Context Learning</strong>, which fine-tunes the model with <em>in-context teacher forcing</em> and improves extrapolation consistency via <em>gradient-reweighted distribution matching distillation</em>.
                                    (iii) To extend the model for interactive multi-garment video customization, we propose <strong className="text-white font-medium">Training-Free KV Cache Rescheduling</strong>, which includes <em>garment KV refresh</em>, <em>historical KV withdraw</em>, and <em>reference KV disentangle</em> to achieve garment switching while preserving motion coherence.
                                    Our FashionChameleon uniquely supports interactive customization and consistent long-video extrapolation, while achieving real-time generation at 23.8 FPS on a single GPU, 30-180× faster than existing baselines.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* Methodology */}
                    <section id="method" className="py-24 px-12 relative">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex flex-col items-center text-center mb-10">
                                <h2 className="text-3xl md:text-4xl font-serif italic text-white tracking-tight">Methodology</h2>
                                <div className="w-16 h-px bg-[var(--accent)]/40 mt-1"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-8 mb-4">
                                { [
                                    { 
                                        title: <>I. Teacher Model with<br/>In-Context Learning</>, 
                                        desc: "We train the teacher model via in-context learning to condition on a reference image and a target garment image. During training, we preserve the image-to-video property by keeping the first generated frame consistent with the reference image except for the garment appearance. By ensuring the reference and target garments differ, the model implicitly learns coherent single-garment switching." 
                                    },
                                    { 
                                        title: <>II. Streaming Distillation with<br/>In-Context Learning</>, 
                                        desc: "We first fine-tune the multi-step bidirectional teacher model into a multi-step autoregressive student model via in-context teacher forcing on clean data. The student model is then optimized with gradient-reweighted distribution matching distillation for few-step autoregressive generation, combined with self-forcing to better align training and inference." 
                                    },
                                    { 
                                        title: "III. Training-Free KV Cache Rescheduling", 
                                        desc: "During inference, we extend the single-garment switching model to interactive multi-garment switching while maintaining motion coherence by rescheduling the KV cache through three mechanisms: (i) garment KV refresh for garment-switching during generation, (ii) historical KV withdraw to suppress outdated garment information, and (iii) reference KV disentangle to preserve motion coherence during garment-switching." 
                                    }
                                ].map((pillar, i) => (
                                    <div key={i} className="p-8 bg-white/[0.06] border border-white/10 rounded-3xl group hover:border-[var(--accent)]/40 transition-all duration-1000 text-center flex flex-col justify-start min-h-[460px]">
                                        <div className="min-h-[80px] flex items-center justify-center mb-6">
                                            <h4 className="text-xl md:text-2xl font-serif text-white group-hover:scale-105 transition-transform duration-700 leading-tight tracking-tight">{pillar.title}</h4>
                                        </div>
                                        <p className="text-[17px] font-light text-gray-400 leading-relaxed italic text-justify">{pillar.desc}</p>
                                    </div>
                                ))}
                            </div>

                            <div className="relative group max-w-6xl mx-auto bg-[#0a0a0a] border border-white/10 p-2 rounded-2xl overflow-hidden shadow-2xl">
                                <img
                                    src="src/pipeline.png"
                                    alt="System Architecture"
                                    className="w-full opacity-70 group-hover:opacity-100 transition-all duration-1000"
                                    onError={(e) => { e.target.src = 'https://picsum.photos/seed/fashion-arch/1600/700'; }}
                                />
                            </div>
                        </div>
                    </section>

                    {/* Citation Section */}
                    <section id="bibtex" className="py-24 px-8 text-center bg-black/40">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-col items-center text-center mb-9">
                                <h2 className="text-3xl md:text-4xl font-serif italic text-white tracking-tight">Citation</h2>
                                <div className="w-16 h-px bg-[var(--accent)]/40 mt-1"></div>
                            </div>
                            <div className="bg-white/[0.04] p-12 text-left border border-white/20 rounded-3xl relative group overflow-hidden shadow-2xl hover:border-[var(--accent)]/30 transition-all duration-700">
                                <pre className="text-gray-500 font-mono text-xs md:text-sm leading-relaxed overflow-x-auto">
{`@article{song2026fashionchameleon,
  title={FashionChameleon: Towards Real-Time and Interactive Human-Garment Video Customization},
  author={Quanjian Song, Yefeng Shen, Mengting Chen, Hao Sun, Jinsong Lan, Xiaoyong Zhu, Bo Zheng, Liujuan Cao},
  journal={arXiv preprint arXiv:XXXX.XXXXX},
  year={2026}
}`}
                                </pre>
                                <button 
                                    onClick={(e) => {
                                        const text = `@article{song2026fashionchameleon,
  title={FashionChameleon: Towards Real-Time and Interactive Human-Garment Video Customization},
  author={Quanjian Song, Yefeng Shen, Mengting Chen, Hao Sun, Jinsong Lan, Xiaoyong Zhu, Bo Zheng, Liujuan Cao},
  journal={arXiv preprint arXiv:XXXX.XXXXX},
  year={2026}
}`;
                                        navigator.clipboard.writeText(text).then(() => {
                                            const btn = e.currentTarget;
                                            const originalText = btn.innerText;
                                            btn.innerText = "Copied!";
                                            setTimeout(() => btn.innerText = originalText, 2000);
                                        });
                                    }}
                                    className="mt-12 w-full py-4 bg-white/5 border border-white/10 hover:bg-white hover:text-black transition-all duration-700 uppercase tracking-[0.3em] font-black text-[9px]"
                                >
                                    Copy to Clipboard
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-24 px-12 border-t border-white/5 bg-[#050505]">
                        <div className="max-w-[1600px] mx-auto text-center">
                            <p className="text-[10px] uppercase tracking-[0.4em] font-black text-gray-500">
                                Copyright 2026 FashionChameleon Team. All rights reserved.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
